services:
  pokesync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokesync
    ports:
      - "5000:5000"
    environment:
      # Change this to a long random secret before deploying
      - JWT_KEY=${JWT_KEY:-pokesync-change-this-secret-min-32-chars!!}
    volumes:
      - ./pokesync-data:/pkvault

      # Add save paths in app settings: /pkvault/saves/
      - ./pokesync-saves:/pkvault/saves
